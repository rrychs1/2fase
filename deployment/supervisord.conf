; ═══════════════════════════════════════════════════════════════
;  Supervisor config — runs bot + dashboard inside ONE container
; ═══════════════════════════════════════════════════════════════
;
;  Usage (in docker-compose.yml):
;    command: supervisord -n -c /app/deployment/supervisord.conf
;
;  This is OPTIONAL. The default docker-compose.yml runs two
;  separate containers which is also fine.

[supervisord]
nodaemon=true
logfile=/app/logs/supervisord.log
logfile_maxbytes=5MB
logfile_backups=2
loglevel=info
pidfile=/tmp/supervisord.pid
user=botuser

[program:trading-bot]
command=python -u main.py
directory=/app
autostart=true
autorestart=true
startsecs=10
startretries=5
stopwaitsecs=15
redirect_stderr=true
stdout_logfile=/app/logs/bot_supervisor.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
environment=PYTHONUNBUFFERED="1",PYTHONIOENCODING="utf-8"

[program:dashboard]
command=python -u run_dashboard.py --no-browser
directory=/app
autostart=true
autorestart=true
startsecs=5
startretries=3
stopwaitsecs=10
redirect_stderr=true
stdout_logfile=/app/logs/dashboard_supervisor.log
stdout_logfile_maxbytes=5MB
stdout_logfile_backups=2
environment=PYTHONUNBUFFERED="1",DASHBOARD_HOST="0.0.0.0"
