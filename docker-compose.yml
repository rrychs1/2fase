# ═══════════════════════════════════════════════════════════════
#  docker-compose.yml — Trading Bot + Dashboard
# ═══════════════════════════════════════════════════════════════
#
#  Usage:
#    docker compose up -d --build     # start everything
#    docker compose logs -f           # follow logs
#    docker compose down              # stop
#
#  Environment:
#    All config is in .env (see .env.example for reference).
#    Key variables: BINANCE_API_KEY, BINANCE_API_SECRET,
#    TRADING_ENV, ANALYSIS_ONLY, TELEGRAM_ENABLED, DASHBOARD_PORT.
#

services:
  # ── Trading Bot ──────────────────────────────────────────────
  trading-bot:
    build: .
    container_name: trading-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Ensure correct encoding and real-time output
      - PYTHONIOENCODING=utf-8
      - PYTHONUNBUFFERED=1
      # State file path (inside container, relative to /app)
      - STATE_FILE=data/dashboard_state.json
    volumes:
      # Persist database, state files, and papers across restarts
      - ./data:/app/data
      # Persist logs for debugging
      - ./logs:/app/logs
    command: python -u main.py
    networks:
      - bot-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      # Check if bot wrote state file within the last 3 minutes
      test: ["CMD-SHELL", "find data/dashboard_state.json -mmin -3 2>/dev/null | grep -q . || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 45s

  # ── Dashboard ────────────────────────────────────────────────
  dashboard:
    build: .
    container_name: trading-dashboard
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONIOENCODING=utf-8
      - PYTHONUNBUFFERED=1
      # Listen on all interfaces inside the container
      - DASHBOARD_HOST=0.0.0.0
      # Share the same state file as the bot
      - STATE_FILE=data/dashboard_state.json
    ports:
      # Map dashboard port: host:container (default 8000)
      - "${DASHBOARD_PORT:-8000}:${DASHBOARD_PORT:-8000}"
    volumes:
      # Same data and logs as the bot (read-only access is sufficient)
      - ./data:/app/data
      - ./logs:/app/logs
    command: python -u run_dashboard.py --no-browser
    depends_on:
      trading-bot:
        # Wait until bot is healthy before starting dashboard
        condition: service_healthy
    networks:
      - bot-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      # curl the dashboard health endpoint
      test: ["CMD", "curl", "-f", "http://localhost:${DASHBOARD_PORT:-8000}/dashboard/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

# ── Network ──────────────────────────────────────────────────
networks:
  bot-net:
    driver: bridge
